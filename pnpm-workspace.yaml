# pnpm workspace — covers all Astro/Node projects under this monorepo
#
# With this in place:
#   - Shared dependencies install once at the root, symlinked into each project
#   - `pnpm -r typecheck` runs typecheck across every project
#   - `pnpm -r test` runs every test suite
#   - `pnpm -r build` builds every site
#
# Each project keeps its own package.json + lockfile entry; this file just
# tells pnpm "these are siblings, treat them as a workspace."

packages:
  # STRLedger is the parent brand site (thestrledger.com).
  # The *-Tools entries below are sister sites — free tools that funnel back here.
  # STRManuals/site is the paid-PDF storefront (strmanuals.com).
  - 'STRLedger'
  - 'STRBuyers-Tools'
  - 'STRGuests-Tools'
  - 'STRHost-Tools'
  - 'STRLaws'
  - 'STRListingAudit-Tools'
  - 'STRManuals/site'
  - 'STROps-Tools'
  - 'tools/empire-console'
  - 'tools/pinforge-api'
  - 'tools/catalog-api'
  - 'packages/*'  # Phase 1 shared packages
