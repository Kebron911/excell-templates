# ops/atlas.yaml — the empire's directory of everything
#
# Read by:
#   - tools/empire-console — /atlas (main directory)
#   - tools/empire-console — Cmd+K palette on every page
#
# Sections are ordered by frequency of use. Top sections render expanded;
# lower sections render collapsed (toggled by `expanded: true|false`).
# When the user filters, sections that contain matches auto-expand.
#
# Schema per item:
#   name:    string   (display name)
#   url:     string   (relative for internal, absolute for external)
#   kind:    internal | external | doc | code | yaml | runbook
#   note:    optional one-liner
#   status:  optional — active | beta | placeholder
#   tags:    optional array — for future task-based filtering
#
# SECURITY: this file IS in git. Never put credentials here.

