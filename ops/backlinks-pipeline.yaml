#       - IndexNow + GSC submit (W43) — fast indexing
#
#     Reactivate outreach when ANY trigger hits:
#       - MRR > $3k/mo
#       - 1–2 podcast appearances landed
#       - First original data study published (e.g. STR Tax Survey)
