# Vendor + tool inventory (ops/vendor-inventory.yaml)
#
# Source of truth for the empire's monthly burn. Read by:
#   - tools/empire-console (Maintain → Vendors)
#   - infrastructure/n8n/flows/vendor-renewal-watch (P1 alert if renewal ≤7d)
#
# Schema (per-vendor):
#   vendor:           string  (required)
#   account_email:    string
#   plan:             string
#   monthly_cost:     number  (USD; required, may be 0 for usage-based)
#   annual_cost:      number  (USD; only if billed annually)
#   billing_date:     YYYY-MM-DD
#   renewal_date:     YYYY-MM-DD  (next renewal — drives the ≤30d / ≤7d alerts)
#   replaceability:   1-5     (1 = locked-in, 5 = trivial swap)
#   category:         string  (e.g. infra, marketing, finance)
#   notes:            string
#
# Daniel: replace these placeholders with real values as you sign up. The console
# reads this file on every page load — no restart needed.

vendors:
