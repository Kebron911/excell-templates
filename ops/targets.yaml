# ops/targets.yaml — quarterly + monthly empire targets
#
# Read by:
#   - tools/empire-console — /today/targets + Today landing pace card
#
# `actual` is hand-set in v1; Phase 3 wires Stripe/IS/GA4 to populate it auto.
#
# Schema:
#   metric:   string  (display name)
#   unit:     usd | count | percent
#   period:   month | quarter | year
#   target:   number  (the goal)
#   actual:   number  (current state — manually updated until Phase 3)
#   updated:  YYYY-MM-DD
#   notes:    optional

