  - domain: strguests.tools
    role: site
    registrar: Hostinger
    expires: 2027-05-01
    ssl_provider: Hostinger AutoSSL
    ssl_check_url: https://strguests.tools
    notes: Sister site — Guest XP.

  - domain: strhost.tools
    role: site
    registrar: Hostinger
    expires: 2027-05-01
