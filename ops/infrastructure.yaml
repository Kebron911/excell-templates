  - domain: strbuyers.tools
    role: site
    registrar: Hostinger
    expires: 2027-05-01
    ssl_provider: Hostinger AutoSSL
    ssl_check_url: https://strbuyers.tools

  - domain: n8n.thestrledger.com
    role: infra
    registrar: Hostinger
    expires: 2027-04-22
    ssl_provider: Hostinger AutoSSL
    ssl_check_url: https://n8n.thestrledger.com
