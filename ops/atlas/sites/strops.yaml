# ops/atlas/sites/strops.yaml — strops.tools

site:
  id: strops
  name: strops.tools
  role: site
  description: Free tools for active STR operators. Recently shipped SEO-optimized blog (6 launch posts + RSS + schema).
  live_url: https://strops.tools
  domain: strops.tools
  repo_path: STROps-Tools/

local_dev:
  start_command: "pnpm dev"
  port_static: 4321

hosting:
  provider: Hostinger
  doc_root: ~/domains/strops.tools/public_html/
  notes: Static Astro deploy via SSH+rsync. Post-deploy smoke against https://strops.tools.

ci:
  workflow_paths:
    - STROps-Tools/.github/workflows/ci.yml
    - STROps-Tools/.github/workflows/deploy.yml
  smoke_path: STROps-Tools/scripts/smoke.mjs

sections:
  - id: planning
    label: Planning + state
    items:
      - { name: STATE.md,              url: STROps-Tools/.planning/STATE.md, kind: doc }
      - { name: ROADMAP.md,            url: STROps-Tools/.planning/ROADMAP.md, kind: doc }
      - { name: README.md,             url: STROps-Tools/README.md, kind: doc }
      - { name: CLAUDE.md,             url: STROps-Tools/CLAUDE.md, kind: doc }
      - { name: MEMORY.md,             url: STROps-Tools/MEMORY.md, kind: doc }
      - { name: docs/,                 url: STROps-Tools/docs/, kind: code }

  - id: code
    label: Code
    items:
      - { name: src/,                  url: STROps-Tools/src/, kind: code }
      - { name: src/pages/blog,        url: STROps-Tools/src/pages/blog/, kind: code, status: placeholder }
      - { name: scripts/,              url: STROps-Tools/scripts/, kind: code }
      - { name: tests/,                url: STROps-Tools/tests/, kind: code }
      - { name: public/,               url: STROps-Tools/public/, kind: code }

  - id: blog
    label: SEO blog (recently shipped)
    items:
      - { name: Blog index,            url: https://strops.tools/blog, kind: external, status: placeholder }
      - { name: RSS feed,              url: https://strops.tools/rss.xml, kind: external, status: placeholder }
