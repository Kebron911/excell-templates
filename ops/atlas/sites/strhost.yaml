# ops/atlas/sites/strhost.yaml — strhost.tools

site:
  id: strhost
  name: strhost.tools
  role: site
  description: Free tools for STR hosts (lifecycle stage = Host operations). Sister site to strguests / strops / strbuyers.
  live_url: https://strhost.tools
  domain: strhost.tools
  repo_path: STRHost-Tools/

local_dev:
  start_command: "pnpm dev"
  port_static: 4321

hosting:
  provider: Hostinger
  doc_root: ~/domains/strhost.tools/public_html/

ci:
  workflow_paths:
    - STRHost-Tools/.github/workflows/ci.yml
    - STRHost-Tools/.github/workflows/deploy.yml
  smoke_path: STRHost-Tools/scripts/smoke.mjs

sections:
  - id: planning
    label: Planning + state
    items:
      - { name: STATE.md,              url: STRHost-Tools/.planning/STATE.md, kind: doc }
      - { name: ROADMAP.md,            url: STRHost-Tools/.planning/ROADMAP.md, kind: doc }
      - { name: README.md,             url: STRHost-Tools/README.md, kind: doc }
      - { name: CLAUDE.md,             url: STRHost-Tools/CLAUDE.md, kind: doc }
      - { name: MEMORY.md,             url: STRHost-Tools/MEMORY.md, kind: doc }
      - { name: docs/,                 url: STRHost-Tools/docs/, kind: code }

  - id: code
    label: Code
    items:
      - { name: src/,                  url: STRHost-Tools/src/, kind: code }
      - { name: scripts/,              url: STRHost-Tools/scripts/, kind: code }
      - { name: tests/,                url: STRHost-Tools/tests/, kind: code }
      - { name: public/,               url: STRHost-Tools/public/, kind: code }

  - id: tools-on-site
    label: Live tools on this site
    items:
      - { name: Homepage,              url: https://strhost.tools, kind: external }
      # Add specific tools as they ship — auto-pulled from ops/assets/tools.yaml site=strhost
