# ops/newsletter-pipeline.yaml — newsletter broadcasts (drafts, scheduled, sent)
#
# Read by:
#   - tools/empire-console — /promote/newsletter
#   - infrastructure/n8n/flows/newsletter-cadence-watch  (weekly Mon, P1 if no send in 14d)
#   - infrastructure/n8n/flows/newsletter-perf-watch     (on send, P1 if open <20% or unsub >0.5%)
#
# Two layers:
#   1. METADATA — declarative: target list (IS tag), planned cadence, owner
#   2. DRAFTS / SCHEDULED — what's next out the door
#   3. SENT — historical log (also auto-populated from IS API in Phase 4)

newsletters:
  - id: str-ledger-weekly
    name: The STR Ledger Weekly
    list_source: influencersoft
    is_tag: newsletter-weekly
    cadence: weekly
    planned_send_day: thursday
    owner: Daniel
    notes: Primary broadcast newsletter — anchor for the empire's owned channel.

  # Add a Ghost newsletter if blog.thestrledger.com Ghost members get a separate digest.
  # - id: ghost-blog-digest
  #   name: STR Ledger Blog Digest
  #   list_source: ghost
  #   cadence: weekly
  #   owner: Daniel

