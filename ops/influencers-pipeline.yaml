# ops/influencers-pipeline.yaml — influencer prospects + active partnerships
#
# Read by:
#   - tools/empire-console — /promote/influencers
#   - infrastructure/n8n/flows/outreach-followup-watch
#
# State machine:
#   prospect → contacted → negotiating → active → paused | ended
#
# Compensation models:
#   - free_tier:      free Vault tier in exchange for promotion (founding affiliates per PROGRESS §P5.7)
#   - revenue_share:  affiliate % (default 30% / 60-day cookie)
#   - flat_fee:       paid placement
#   - product_swap:   trade content/audience
#
# Tracking attribution:
#   - utm_campaign: their handle
#   - coupon_code: their code (also drives referral attribution)

