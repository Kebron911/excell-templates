# ops/citations.yaml — profile + directory citation log
#
# Read by:
#   - tools/empire-console — /promote/citations
#   - infrastructure/n8n/flows/W42 (profile refresher — when built)
#
# Philosophy:
#   For a new brand without reputation, citations are the cheapest backlink/branded-SERP
#   work available. Each entry = a free dofollow profile or directory listing earned in
#   one weekend (Phase 0 sprints in docs/backlink-automation-plan.md).
#
# State machine:
#   pending  → not yet created (do this weekend)
#   live     → profile created, link active
#   stale    → bio/headshot more than 90 days behind Identity table
#   broken   → URL returns 404 or profile suspended
#
# Tier:
#   T1  Universal trust signals (Crunchbase, LinkedIn, Trustpilot, G2, Capterra)
#   T2  Niche-relevant (STR/Airbnb directories, host-tool indexes, REI communities)
#   T3  Founder-brand (About.me, Substack, Medium, AngelList founder profile)

