# Read by:
#   - tools/empire-console — /maintain/assets/documents
#   - infrastructure/n8n/flows/document-expiry-watch
#       (weekly Mon, P1 if expires ≤30d, P0 if expired)
#
# Schema:
#   id:           string
#   name:         string
#   category:     legal | finance | tax | banking | insurance | identity |
#                 contract | compliance | brand
#   storage:      vaultwarden | drive | dropbox | physical | repo
#   location_ref: vault entry name OR file path OR cabinet shelf
#   issued:       YYYY-MM-DD
#   expires:      YYYY-MM-DD (optional — for renewable docs)
#   issuer:       string
#   owner:        Daniel | TBD
#   notes:        optional
#
# DO NOT put document contents in here. This is an INDEX.
# Real docs live in Vaultwarden / encrypted Drive folders / physical safe.

