#   tool_type:    pdf-generator | ai-generator | calculator | template-page | utility | dashboard
#   tech:         astro | react-island | express-api | python | n8n
#   uses_api:     [openai | etsy | stripe | gsc | ga4 | none]
#   email_gate:   true | false
#   is_form_id:   if email_gate true, the IS form behind it
#   status:       active | archived | deprecated | beta | draft
#   created:      YYYY-MM-DD
#   last_updated: YYYY-MM-DD
#   owner:        Daniel | TBD

