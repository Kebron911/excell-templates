name: Deploy strguests.tools

on:
  push:
    branches: [main]
    paths:
      - 'STRGuests-Tools/**'
      - '.github/workflows/deploy-strguests-tools.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strguests-tools
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: STRGuests-Tools/pnpm-lock.yaml

      - name: Install
        working-directory: STRGuests-Tools
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: STRGuests-Tools
        run: pnpm build
        env:
          PUBLIC_GA4_ID: ${{ secrets.STRGUESTS_GA4_ID }}

      - name: Verify build output
        working-directory: STRGuests-Tools
        run: |
          test -f dist/index.html
          test -f dist/blog/index.html
          test -f dist/feed.xml
          echo "Build output OK"

      # SSH-based deploy. Uses the master Hostinger account
      # u470667024 + the shared cluster SSH key in secret STR_SSH_KEY.
      # Sidesteps the per-domain FTP sub-user provisioning that broke
      # this site's first deploy (the strguests.tools FTP account didn't
      # exist in hPanel; SSH master always works).
      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STR_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Sanity check the written key. ssh-keygen -y derives the public
          # key — fails loudly if the private key is malformed.
          echo "Key file size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Key parses OK"
          # Pin Hostinger's host key. Output ssh-keyscan to known_hosts
          # without swallowing errors so a port-block surfaces in logs.
          ssh-keyscan -p 65002 -t ed25519,rsa,ecdsa 195.35.15.247 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "known_hosts entries: $(wc -l < ~/.ssh/known_hosts)"

      - name: Deploy via rsync over SSH
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e 'ssh -i ~/.ssh/id_ed25519 -p 65002 -o StrictHostKeyChecking=accept-new' \
            ./STRGuests-Tools/dist/ \
            u470667024@195.35.15.247:/home/u470667024/domains/strguests.tools/public_html/

      # IndexNow auto-submit — fans out to Bing/Yandex/Seznam/Naver.
      - name: Notify IndexNow
        continue-on-error: true
        run: node STRGuests-Tools/scripts/indexnow-submit.mjs
