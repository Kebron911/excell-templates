name: Deploy strguests.tools

on:
  push:
    branches: [main]
    paths:
      - 'STRGuests-Tools/**'
      - '.github/workflows/deploy-strguests-tools.yml'
  pull_request:
    paths:
      - 'STRGuests-Tools/**'
      - '.github/workflows/deploy-strguests-tools.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strguests-tools
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (root workspace)
        # STRGuests imports from @str/seo, @str/format, @str/email-gate
        # (shared workspace packages). Workspace install builds the
        # symlinks from STRGuests-Tools/node_modules/@str/* to packages/*.
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        # Compiles packages/seo, format, email-gate, url-state to their
        # dist/ folders. STRGuests's astro build resolves @str/* to those
        # dist files via main/exports declared in each package's package.json.
        run: pnpm -r --filter "./packages/*" build

      - name: Typecheck
        working-directory: STRGuests-Tools
        run: pnpm typecheck

      - name: Unit tests
        working-directory: STRGuests-Tools
        run: pnpm test

      - name: Build
        working-directory: STRGuests-Tools
        env:
          PUBLIC_GA4_ID: ${{ secrets.STRGUESTS_GA4_ID }}
        run: pnpm build

      - name: Verify build output
        working-directory: STRGuests-Tools
        run: |
          set -e
          test -f dist/index.html
          test -f dist/house-rules-pdf/index.html
          test -f dist/welcome-book/index.html
          test -f dist/wifi-sign/index.html
          test -f dist/check-in-instructions/index.html
          test -f dist/templates/index.html
          test -f dist/get-the-templates/index.html
          test -f dist/about/index.html
          test -f dist/contact/index.html
          test -f dist/sitemap-index.xml
          test -f dist/robots.txt
          echo "Build output OK"

      # Playwright runs after build because playwright.config.ts spawns
      # `pnpm preview`, which requires dist/ to exist.
      - name: Install Playwright browsers
        id: pw_install
        continue-on-error: true
        working-directory: STRGuests-Tools
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        if: steps.pw_install.outcome == 'success'
        working-directory: STRGuests-Tools
        run: pnpm test:e2e

      # Deploy only on push to main. PRs run through the verification gates above
      # (typecheck/test/build/e2e) but do not deploy.
      #
      # SSH-based deploy. Uses the master Hostinger account u470667024
      # + the shared cluster SSH key in secret STR_SSH_KEY. Sidesteps
      # the per-domain FTP sub-user provisioning that broke this site's
      # first deploy (the strguests.tools FTP account didn't exist in
      # hPanel; SSH master always works).
      - name: Set up SSH key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STR_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "Key file size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Key parses OK"
          ssh-keyscan -p 65002 -t ed25519,rsa,ecdsa 195.35.15.247 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "known_hosts entries: $(wc -l < ~/.ssh/known_hosts)"

      - name: Deploy via rsync over SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e 'ssh -i ~/.ssh/id_ed25519 -p 65002 -o StrictHostKeyChecking=accept-new' \
            ./STRGuests-Tools/dist/ \
            u470667024@195.35.15.247:/home/u470667024/domains/strguests.tools/public_html/

      - name: Pre-launch smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: STRGuests-Tools
        env:
          SMOKE_BASE_URL: https://strguests.tools
        run: node scripts/smoke.mjs

      # IndexNow auto-submit — fans out to Bing/Yandex/Seznam/Naver.
      - name: Notify IndexNow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: node STRGuests-Tools/scripts/indexnow-submit.mjs
