name: Deploy strhost.tools

on:
  push:
    branches: [main]
    paths:
      - 'STRHost-Tools/**'
      - '.github/workflows/deploy-strhost-tools.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strhost-tools
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: STRHost-Tools/pnpm-lock.yaml

      - name: Install
        working-directory: STRHost-Tools
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: STRHost-Tools
        run: pnpm build
        env:
          PUBLIC_GA4_ID: ${{ secrets.STRHOST_GA4_ID }}

      - name: Verify build output
        working-directory: STRHost-Tools
        run: |
          test -f dist/index.html
          test -f dist/blog/index.html
          test -d dist/blog/how-to-calculate-airbnb-profitability
          echo "Build output OK"

      # SSH-based deploy via the master Hostinger account u470667024 +
      # the shared cluster SSH key in secret STR_SSH_KEY. Same pattern
      # as strguests-tools — single key for the whole cluster, drops
      # the per-site STRHOST_FTP_* secrets.
      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STR_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Key parses OK"
          ssh-keyscan -p 65002 -t ed25519,rsa,ecdsa 195.35.15.247 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via rsync over SSH
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e 'ssh -i ~/.ssh/id_ed25519 -p 65002 -o StrictHostKeyChecking=accept-new' \
            ./STRHost-Tools/dist/ \
            u470667024@195.35.15.247:/home/u470667024/domains/strhost.tools/public_html/

      # Notify Bing/Yandex/Seznam/Naver via IndexNow. Soft-fail so a
      # transient API hiccup doesn't fail the whole deploy.
      - name: Notify IndexNow
        continue-on-error: true
        run: node STRHost-Tools/scripts/indexnow-submit.mjs
