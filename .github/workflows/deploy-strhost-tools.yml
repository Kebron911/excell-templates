name: Deploy strhost.tools

on:
  push:
    branches: [main]
    paths:
      - 'STRHost-Tools/**'
      - '.github/workflows/deploy-strhost-tools.yml'
  pull_request:
    paths:
      - 'STRHost-Tools/**'
      - '.github/workflows/deploy-strhost-tools.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strhost-tools
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter './packages/**' build

      - name: Typecheck
        working-directory: STRHost-Tools
        run: pnpm typecheck

      - name: Unit tests
        working-directory: STRHost-Tools
        run: pnpm test

      - name: Build
        working-directory: STRHost-Tools
        env:
          PUBLIC_GA4_ID: ${{ secrets.STRHOST_GA4_ID }}
        run: pnpm build

      - name: Verify build output
        working-directory: STRHost-Tools
        run: |
          set -e
          test -f dist/index.html
          test -f dist/airbnb-fee-calculator/index.html
          test -f dist/profit-calculator/index.html
          test -f dist/cleaning-fee-calculator/index.html
          test -f dist/revpar-calculator/index.html
          test -f dist/break-even-calculator/index.html
          test -f dist/cohost-split-calculator/index.html
          test -f dist/lodging-tax/index.html
          test -f dist/blog/index.html
          test -f dist/sitemap-index.xml
          test -f dist/robots.txt
          echo "Build output OK"

      # Playwright runs after build because playwright.config.ts spawns
      # `pnpm preview`, which requires dist/ to exist.
      - name: Install Playwright browsers
        id: pw_install
        continue-on-error: true
        working-directory: STRHost-Tools
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        if: steps.pw_install.outcome == 'success'
        working-directory: STRHost-Tools
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure() && steps.pw_install.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-strhost
          path: STRHost-Tools/playwright-report
          retention-days: 14

      # Deploy only on push to main. PRs run through the verification gates
      # above (typecheck/test/build/e2e) but do not deploy.
      #
      # SSH-based deploy via the master Hostinger account u470667024 + the
      # shared cluster SSH key in secret STR_SSH_KEY. Same pattern as
      # strguests / strops / strbuyers — single key for the whole cluster,
      # drops the per-site STRHOST_FTP_* secrets.
      - name: Set up SSH key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STR_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Key parses OK"
          ssh-keyscan -p 65002 -t ed25519,rsa,ecdsa 195.35.15.247 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via rsync over SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e 'ssh -i ~/.ssh/id_ed25519 -p 65002 -o StrictHostKeyChecking=accept-new' \
            ./STRHost-Tools/dist/ \
            u470667024@195.35.15.247:/home/u470667024/domains/strhost.tools/public_html/

      - name: Post-deploy smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: STRHost-Tools
        env:
          SMOKE_BASE_URL: https://strhost.tools
        run: node scripts/post-deploy-smoke.mjs

      # Notify Bing/Yandex/Seznam/Naver via IndexNow. Soft-fail so a
      # transient API hiccup doesn't fail the whole deploy.
      - name: Notify IndexNow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: node STRHost-Tools/scripts/indexnow-submit.mjs
