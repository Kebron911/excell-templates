name: Deploy strhost.tools

on:
  push:
    branches: [main]
    paths:
      - 'STRHost-Tools/**'
      - '.github/workflows/deploy-strhost-tools.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strhost-tools
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: STRHost-Tools/pnpm-lock.yaml

      - name: Install
        working-directory: STRHost-Tools
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: STRHost-Tools
        run: pnpm build
        env:
          PUBLIC_GA4_ID: ${{ secrets.STRHOST_GA4_ID }}

      - name: Verify build output
        working-directory: STRHost-Tools
        run: |
          test -f dist/index.html
          test -f dist/blog/index.html
          test -d dist/blog/how-to-calculate-airbnb-profitability
          echo "Build output OK"

      # Normalize STRHOST_DOC_ROOT for the FTP user's chroot.
      #
      # Hostinger's domain-scoped FTP user (e.g. u123.strhost.tools) is
      # chrooted to /home/<u>/domains/<domain>/. If the secret holds the
      # SSH-visible absolute path /home/<u>/domains/<domain>/public_html,
      # the FTP server treats `/home/...` as a path inside the chroot and
      # creates a deeply nested mirror (took down the first deploy until
      # we caught it via SSH). Strip that prefix so FTP sees /public_html.
      #
      # Also: strip stray CR/LF/whitespace from the secret value, and
      # ensure trailing slash (FTP-Deploy-Action requires it).
      - name: Normalize server-dir
        id: server_dir
        shell: bash
        env:
          RAW_DIR: ${{ secrets.STRHOST_DOC_ROOT }}
        run: |
          DIR=$(printf '%s' "$RAW_DIR" | tr -d '\r\n[:space:]')
          # Strip leading /home/<user>/domains/<domain>/ if present.
          DIR=$(printf '%s' "$DIR" | sed -E 's#^/home/[^/]+/domains/[^/]+##')
          # Ensure leading slash, single trailing slash.
          [[ "$DIR" != /* ]] && DIR="/$DIR"
          DIR="${DIR%/}/"
          printf 'value=%s\n' "$DIR" >> "$GITHUB_OUTPUT"

      - name: Deploy to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.STRHOST_FTP_HOST }}
          username: ${{ secrets.STRHOST_FTP_USER }}
          password: ${{ secrets.STRHOST_FTP_PASS }}
          port: ${{ secrets.STRHOST_FTP_PORT }}
          protocol: ftps
          local-dir: ./STRHost-Tools/dist/
          server-dir: ${{ steps.server_dir.outputs.value }}
          # Keep these on the server after deploy. Note: .htaccess IS
          # deployed (it's in public/.htaccess and we want our cache rules
          # applied on every deploy).
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
          # State file caches what we've uploaded so subsequent deploys
          # only sync changed files (much faster than full re-upload).
          state-name: .ftp-deploy-sync-state.json
          dry-run: false
          log-level: standard
