# strguests.tools — CI for STRGuests-Tools/
#
# Runs on push to main and on any PR that touches STRGuests-Tools/. Two jobs
# in parallel:
#   - lint-and-unit:   eslint + vitest + server tsc + astro check
#   - e2e-and-build:   astro build + pin/og generators + Playwright smoke
#
# Both jobs use pnpm with content-hashed cache. Playwright browsers are cached
# separately keyed on the playwright version so they don't re-download every run.

name: strguests-tools CI

on:
  push:
    branches: [main]
    paths:
      - 'STRGuests-Tools/**'
      - '.github/workflows/strguests-tools.yml'
  pull_request:
    paths:
      - 'STRGuests-Tools/**'
      - '.github/workflows/strguests-tools.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: STRGuests-Tools

concurrency:
  group: strguests-tools-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-typecheck:
    name: Typecheck + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: STRGuests-Tools/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # NOTE: `pnpm lint` is intentionally not run here — there's no .eslintrc
      # in the project yet. Re-enable once an eslint config lands.

      - name: Astro + TypeScript typecheck
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

  e2e-and-build:
    name: Build + E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: STRGuests-Tools/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version (for cache key)
        id: pw
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Astro build (also runs pin + og generators)
        run: pnpm build

      - name: Playwright smoke
        run: pnpm exec playwright test --reporter=line
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: STRGuests-Tools/playwright-report
          retention-days: 7
