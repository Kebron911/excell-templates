name: Deploy listingaudit-api

on:
  push:
    branches: [main]
    paths:
      - 'STRListingAudit-Tools/server/**'
      - 'STRListingAudit-Tools/Dockerfile'
      - 'STRListingAudit-Tools/.dockerignore'
      - 'STRListingAudit-Tools/docker-compose.production.yml'
      - 'STRListingAudit-Tools/package.json'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-strlistingaudit-api.yml'
  pull_request:
    paths:
      - 'STRListingAudit-Tools/server/**'
      - 'STRListingAudit-Tools/Dockerfile'
      - '.github/workflows/deploy-strlistingaudit-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strlistingaudit-api
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/listingaudit-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          tag="sha-${GITHUB_SHA::12}"
          image_lower="$(echo "${{ env.IMAGE }}" | tr '[:upper:]' '[:lower:]')"
          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image_lower=${image_lower}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: STRListingAudit-Tools/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image_lower }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_lower }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.N8N_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p ${{ secrets.N8N_SSH_PORT }} -t ed25519,rsa,ecdsa ${{ secrets.N8N_SSH_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Pull image and restart service on VPS
        env:
          SSH_HOST: ${{ secrets.N8N_SSH_HOST }}
          SSH_PORT: ${{ secrets.N8N_SSH_PORT }}
          SSH_USER: ${{ secrets.N8N_SSH_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd /home/kebron/git/mydocker/listingaudit-api && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f --filter 'label=ghcr.io/listingaudit-api' || true"

      - name: Wait for healthy and smoke api
        run: |
          set -e
          for i in $(seq 1 30); do
            if curl -fsS https://api.listingaudit.tools/api/health > /dev/null; then
              echo "api healthy after ${i} attempts"
              exit 0
            fi
            sleep 3
          done
          echo "api did not respond healthy within 90s"
          exit 1
