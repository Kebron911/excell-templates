name: Deploy strbuyers.tools

on:
  push:
    branches: [main]
    paths:
      - 'STRBuyers-Tools/**'
      - '.github/workflows/deploy-strbuyers-tools.yml'
  pull_request:
    paths:
      - 'STRBuyers-Tools/**'
      - '.github/workflows/deploy-strbuyers-tools.yml'
  workflow_dispatch:

concurrency:
  group: deploy-strbuyers-tools
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter './packages/**' build

      - name: Typecheck (astro + client)
        working-directory: STRBuyers-Tools
        run: pnpm typecheck

      - name: Server typecheck
        working-directory: STRBuyers-Tools
        run: pnpm server:typecheck

      - name: Unit tests (client)
        working-directory: STRBuyers-Tools
        run: pnpm test

      - name: Unit tests (server)
        working-directory: STRBuyers-Tools
        run: pnpm server:test

      - name: Build static site (232 pages)
        working-directory: STRBuyers-Tools
        env:
          PUBLIC_GA4_ID: ${{ secrets.STRBUYERS_GA4_ID }}
          PUBLIC_ADSENSE_ENABLED: 'false'
        run: pnpm build

      - name: Build OG images
        working-directory: STRBuyers-Tools
        run: pnpm build:og

      - name: Verify build output
        working-directory: STRBuyers-Tools
        run: |
          set -e
          test -f dist/index.html
          test -f dist/dscr-loan-calculator/index.html
          test -f dist/cities/index.html
          test -f dist/cities/austin-tx/index.html
          test -f dist/disclosures/index.html
          test -f dist/sitemap-index.xml
          test -f dist/robots.txt
          echo "Build output OK"

      # Playwright runs after build because playwright.config.ts spawns
      # `pnpm preview`, which requires dist/ to exist.
      - name: Install Playwright browsers
        id: pw_install
        continue-on-error: true
        working-directory: STRBuyers-Tools
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        if: steps.pw_install.outcome == 'success'
        working-directory: STRBuyers-Tools
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure() && steps.pw_install.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-strbuyers
          path: STRBuyers-Tools/playwright-report
          retention-days: 14

      # Deploy on push to main OR manual workflow_dispatch. PRs run through
      # the verification gates above (typecheck/test/build/e2e) but do not
      # deploy.
      #
      # SSH-based deploy. Uses the master Hostinger account u470667024 + the
      # shared cluster SSH key in secret STR_SSH_KEY. Sidesteps per-domain
      # FTP sub-user provisioning — the strbuyers FTP sub-account was never
      # provisioned by Hostinger; SSH master always works.
      - name: Set up SSH key
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STR_SSH_KEY }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "Key file size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Key parses OK"
          ssh-keyscan -p 65002 -t ed25519,rsa,ecdsa 195.35.15.247 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "known_hosts entries: $(wc -l < ~/.ssh/known_hosts)"

      - name: Deploy via rsync over SSH
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e 'ssh -i ~/.ssh/id_ed25519 -p 65002 -o StrictHostKeyChecking=accept-new' \
            ./STRBuyers-Tools/dist/ \
            u470667024@195.35.15.247:/home/u470667024/domains/strbuyers.tools/public_html/

      - name: Pre-launch smoke
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        working-directory: STRBuyers-Tools
        env:
          SMOKE_BASE_URL: https://strbuyers.tools
        run: node scripts/smoke.mjs
