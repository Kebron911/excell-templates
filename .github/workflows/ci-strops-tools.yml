name: CI strops.tools

on:
  pull_request:
    paths:
      - 'STROps-Tools/**'
      - '.github/workflows/ci-strops-tools.yml'
  push:
    branches: [main]
    paths:
      - 'STROps-Tools/**'
      - '.github/workflows/ci-strops-tools.yml'
  workflow_dispatch:

concurrency:
  group: ci-strops-tools-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: STROps-Tools/pnpm-lock.yaml

      - name: Install
        working-directory: STROps-Tools
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: STROps-Tools
        run: pnpm typecheck

      - name: Unit tests (vitest)
        working-directory: STROps-Tools
        run: pnpm test

      - name: Build
        working-directory: STROps-Tools
        run: pnpm build
        env:
          PUBLIC_GA4_ID: ${{ secrets.STROPS_GA4_ID }}
          PUBLIC_ESP_WEBHOOK: ${{ secrets.STROPS_ESP_WEBHOOK }}

      - name: Verify build output
        working-directory: STROps-Tools
        run: |
          test -f dist/index.html
          test -f dist/sitemap-index.xml || test -f dist/sitemap.xml
          test -f dist/robots.txt
          test -d dist/og
          echo "Build output OK"

      # Cache Playwright browsers across runs — keyed on the lockfile so a
      # @playwright/test bump invalidates correctly.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('STROps-Tools/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: STROps-Tools
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: STROps-Tools
        run: pnpm exec playwright install-deps chromium

      - name: E2E (Playwright)
        working-directory: STROps-Tools
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-strops-tools
          path: STROps-Tools/playwright-report
          if-no-files-found: ignore
          retention-days: 7
