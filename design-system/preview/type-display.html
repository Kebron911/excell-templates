<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Display specimen</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:32px 36px;background:var(--bg-1);box-sizing:border-box;}
  .spec{font-family:var(--font-display);font-weight:500;color:var(--brand-navy);letter-spacing:-0.015em;line-height:1.02;font-size:96px;margin:0;}
  .spec em{font-family:var(--font-display);font-style:italic;font-weight:400;}
  .spec .p{color:var(--brand-gold);}
  .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:26px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;color:var(--fg-2);text-transform:uppercase;}
  .meta strong{display:block;color:var(--brand-navy);font-family:var(--font-body);font-size:13px;letter-spacing:0;text-transform:none;font-weight:500;margin-top:2px;}
</style>
</head>
<body>
<div class="card">
  <div class="spec">Run rentals<span class="p">.</span></div>
  <div class="meta">
    <div>Family<strong>Cormorant Garamond</strong></div>
    <div>Weight<strong>500 Medium</strong></div>
    <div>Size / tracking<strong>96px / -0.015em</strong></div>
    <div>Use<strong>Hero / H1</strong></div>
  </div>
</div>
</body></html>
