<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing — Editorial rhythm</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:32px 40px;background:var(--bg-1);box-sizing:border-box;}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--brand-gold);margin:0 0 14px;}
  h1{font-family:var(--font-display);font-weight:500;font-size:34px;color:var(--brand-navy);letter-spacing:-0.01em;margin:0 0 14px;line-height:1.1;}
  .rule{width:48px;height:1px;background:var(--brand-gold);margin:0 0 18px;}
  p{font-family:var(--font-body);font-size:14px;color:var(--fg-2);line-height:1.55;margin:0;max-width:520px;}
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Tax season · Schedule E</div>
  <h1>The workbook Amanda uses.<br/>7 minutes per property.</h1>
  <div class="rule"></div>
  <p>Mono eyebrow → 14px gap → display headline → 18px gap → 48px gold rule → 18px gap → body. This vertical rhythm appears on every major headline block across web, blog, and Pinterest.</p>
</div>
</body></html>
