<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Brand — Logo lockups</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 32px;background:var(--bg-1);box-sizing:border-box;}
  h5{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--brand-gold);margin:0 0 14px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .lk{padding:18px;border:1px solid var(--rule);background:var(--brand-parchment);display:flex;align-items:center;justify-content:center;min-height:120px;}
  .lk.inv{background:var(--brand-navy);}
  .cap{font-family:var(--font-mono);font-size:9px;letter-spacing:0.22em;color:var(--fg-3);text-transform:uppercase;margin-top:6px;display:block;}

  /* Horizontal inline lockup */
  .horiz{display:flex;align-items:baseline;gap:8px;font-family:var(--font-display);color:var(--brand-navy);}
  .horiz .the{font-style:italic;font-weight:400;font-size:18px;}
  .horiz .name{font-weight:500;font-size:32px;letter-spacing:-0.01em;}
  .horiz .p{color:var(--brand-gold);}

  /* Signature/email */
  .sig{display:flex;align-items:center;gap:12px;}
  .sig .mg{width:42px;height:42px;border-radius:999px;background:var(--brand-navy);color:var(--brand-parchment);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:500;font-size:22px;letter-spacing:-0.02em;}
  .sig .mg .l{color:var(--brand-gold);}
  .sig .right{display:flex;flex-direction:column;}
  .sig .right .nm{font-family:var(--font-display);font-weight:500;font-size:15px;color:var(--brand-navy);}
  .sig .right .nm .p{color:var(--brand-gold);}
  .sig .right .tg{font-family:var(--font-display);font-style:italic;font-size:12px;color:var(--fg-2);}

  /* Favicon */
  .fav{width:32px;height:32px;border-radius:999px;background:var(--brand-navy);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:500;font-size:17px;color:var(--brand-parchment);letter-spacing:-0.02em;}
  .fav .l{color:var(--brand-gold);}

  /* Reverse monogram */
  .mg-big{width:64px;height:64px;border-radius:999px;background:var(--brand-parchment);border:1.5px solid var(--brand-parchment);color:var(--brand-navy);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:500;font-size:34px;letter-spacing:-0.02em;}
  .mg-big .l{color:var(--brand-gold);}
</style>
</head>
<body>
<div class="card">
  <h5>Lockup variants — by surface</h5>
  <div class="grid">
    <div>
      <div class="lk"><div class="horiz"><span class="the">The</span><span class="name">STR Ledger<span class="p">.</span></span></div></div>
      <span class="cap">Horizontal · nav</span>
    </div>
    <div>
      <div class="lk inv"><div class="horiz" style="color:var(--brand-parchment);"><span class="the">The</span><span class="name">STR Ledger<span class="p">.</span></span></div></div>
      <span class="cap">Horizontal reversed · footer</span>
    </div>
    <div>
      <div class="lk"><div class="sig"><div class="mg">S<span class="l">L</span></div><div class="right"><span class="nm">The STR Ledger<span class="p">.</span></span><span class="tg">Run your rentals before they run you.</span></div></div></div>
      <span class="cap">Email signature</span>
    </div>
    <div>
      <div class="lk inv" style="gap:24px;"><div class="fav">S<span class="l">L</span></div><div class="mg-big">S<span class="l">L</span></div></div>
      <span class="cap">Favicon 32 · Avatar 64</span>
    </div>
  </div>
</div>
</body></html>
