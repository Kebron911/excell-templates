<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Logo — Wordmark reversed</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{
    width:700px;height:260px;background:var(--brand-navy);
    display:flex;align-items:center;justify-content:center;
  }
  .wm{text-align:center;line-height:1;}
  .wm .the{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:36px;color:var(--brand-parchment);display:block;margin-bottom:-4px;}
  .wm .name{font-family:var(--font-display);font-weight:500;font-size:92px;color:var(--brand-parchment);letter-spacing:-0.02em;}
  .wm .name .period{color:var(--brand-gold);}
  .wm .rule{width:56px;height:1px;background:var(--brand-gold);margin:14px auto 10px;}
  .wm .tag{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:0.22em;color:var(--brand-parchment);text-transform:uppercase;}
</style>
</head>
<body>
<div class="card">
  <div class="wm">
    <span class="the">The</span>
    <span class="name">STR Ledger<span class="period">.</span></span>
    <div class="rule"></div>
    <div class="tag">Run your rentals before they run you</div>
  </div>
</div>
</body></html>
