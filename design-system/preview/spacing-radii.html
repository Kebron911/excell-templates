<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing — Radii & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 32px;background:var(--bg-1);box-sizing:border-box;}
  .row{display:flex;gap:14px;align-items:flex-start;}
  .row + .row{margin-top:20px;}
  .box{width:88px;height:64px;background:var(--brand-parchment-alt);border:1px solid var(--rule);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
  .cap{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;color:var(--brand-navy);text-transform:uppercase;}
  h5{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--brand-gold);margin:0 0 10px;}
  .sh{width:120px;height:72px;background:var(--brand-parchment);}
</style>
</head>
<body>
<div class="card">
  <h5>Corner radii — editorial, mostly square</h5>
  <div class="row">
    <div><div class="box" style="border-radius:0"><span class="cap">0</span></div></div>
    <div><div class="box" style="border-radius:2px"><span class="cap">2</span></div></div>
    <div><div class="box" style="border-radius:4px"><span class="cap">4</span></div></div>
    <div><div class="box" style="border-radius:6px"><span class="cap">6</span></div></div>
    <div><div class="box" style="border-radius:10px"><span class="cap">10</span></div></div>
    <div><div class="box" style="border-radius:999px;width:64px;height:64px;"><span class="cap">pill</span></div></div>
  </div>
  <h5 style="margin-top:24px;">Shadow system — whisper-thin</h5>
  <div class="row" style="gap:28px;align-items:center;">
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <div class="sh" style="box-shadow:0 1px 2px rgba(10,31,53,.06),0 1px 1px rgba(10,31,53,.04)"></div>
      <span class="cap">card</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <div class="sh" style="box-shadow:0 8px 24px -8px rgba(10,31,53,.20),0 2px 6px rgba(10,31,53,.08)"></div>
      <span class="cap">lifted</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <div class="sh" style="box-shadow:0 0 0 3px rgba(201,162,75,0.45)"></div>
      <span class="cap">focus gold</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <div class="sh" style="border:1px solid #E7DCC2"></div>
      <span class="cap">hairline</span>
    </div>
  </div>
</div>
</body></html>
