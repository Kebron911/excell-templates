<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors — Core palette</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:32px;background:var(--bg-1);box-sizing:border-box;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .sw{display:flex;flex-direction:column;gap:10px;}
  .chip{height:110px;border:1px solid var(--rule);}
  .meta{display:flex;flex-direction:column;gap:2px;}
  .nm{font-family:var(--font-display);font-weight:500;font-size:16px;color:var(--brand-navy);line-height:1.1;}
  .hx{font-family:var(--font-mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--fg-2);}
  .rl{font-family:var(--font-body);font-size:11px;color:var(--fg-3);line-height:1.35;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#12304E"></div><div class="meta"><span class="nm">Harbor Navy</span><span class="hx">#12304E</span><span class="rl">Primary · authority</span></div></div>
    <div class="sw"><div class="chip" style="background:#F6EFE2"></div><div class="meta"><span class="nm">Parchment</span><span class="hx">#F6EFE2</span><span class="rl">Paper · default bg</span></div></div>
    <div class="sw"><div class="chip" style="background:#C9A24B"></div><div class="meta"><span class="nm">Muted Gold</span><span class="hx">#C9A24B</span><span class="rl">Accent · period mark</span></div></div>
    <div class="sw"><div class="chip" style="background:#B5725E"></div><div class="meta"><span class="nm">Clay Rose</span><span class="hx">#B5725E</span><span class="rl">Warmth · sparingly</span></div></div>
    <div class="sw"><div class="chip" style="background:#2B2B2B"></div><div class="meta"><span class="nm">Graphite</span><span class="hx">#2B2B2B</span><span class="rl">Ink · body copy</span></div></div>
  </div>
</div>
</body></html>
