<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components — Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 32px;background:var(--bg-1);box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr;gap:20px 24px;}
  label{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--brand-navy);display:block;margin-bottom:6px;}
  .fld{display:flex;flex-direction:column;}
  input,select{font-family:var(--font-body);font-size:14px;padding:10px 12px;border:1px solid var(--rule-strong);border-radius:2px;background:var(--brand-parchment);color:var(--fg-1);}
  input:focus{outline:none;border-color:var(--brand-navy);box-shadow:0 0 0 3px rgba(201,162,75,0.45);}
  .help{font-family:var(--font-body);font-size:11px;color:var(--fg-3);margin-top:6px;}
  .err{font-family:var(--font-body);font-size:11px;color:var(--brand-clay);margin-top:6px;}
  .inp-err{border-color:var(--brand-clay);}
  .check{display:flex;align-items:center;gap:10px;font-family:var(--font-body);font-size:13px;color:var(--fg-1);}
  .check input{width:16px;height:16px;accent-color:var(--brand-navy);}
</style>
</head>
<body>
<div class="card">
  <div class="fld"><label>Email</label><input value="sarah@smokycabin.co"/><span class="help">We'll send the 47-deduction guide here.</span></div>
  <div class="fld"><label>Focused</label><input value="sarah@smokycabin.co" style="border-color:var(--brand-navy);box-shadow:0 0 0 3px rgba(201,162,75,0.45);"/><span class="help">Gold focus ring on any input.</span></div>
  <div class="fld"><label>Error</label><input class="inp-err" value="not-an-email"/><span class="err">That doesn't look like a valid email.</span></div>
  <div class="fld"><label>Property count</label>
    <select><option>3–5 properties</option><option>6–10 properties</option></select>
  </div>
  <div class="fld" style="grid-column:1/-1;gap:10px;">
    <label>Consent</label>
    <div class="check"><input type="checkbox" checked/><span>Email me weekly Friday tips (unsubscribe anytime).</span></div>
    <div class="check"><input type="checkbox"/><span>Add me to the free private host group.</span></div>
  </div>
</div>
</body></html>
