<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components — Badges & labels</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 32px;background:var(--bg-1);box-sizing:border-box;display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .eyebrow{font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--brand-gold);min-width:100px;}
  .chip{font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;padding:6px 10px;border:1px solid var(--rule-strong);}
  .chip.navy{background:var(--brand-navy);color:var(--brand-parchment);border-color:var(--brand-navy);}
  .chip.gold{background:var(--brand-gold);color:var(--brand-navy);border-color:var(--brand-gold);}
  .chip.clay{background:var(--brand-clay);color:var(--brand-parchment);border-color:var(--brand-clay);}
  .chip.ghost{background:transparent;color:var(--brand-navy);}
  .pill{border-radius:999px;}
  .tag{font-family:var(--font-body);font-size:12px;color:var(--fg-2);padding:4px 12px;background:var(--brand-parchment-alt);border-radius:999px;}
  .sku-badge{font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;color:var(--brand-gold);text-transform:uppercase;padding:6px 0;border-top:1px solid var(--brand-gold);border-bottom:1px solid var(--brand-gold);}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="eyebrow">Category</span>
    <span class="chip navy">Tax season</span>
    <span class="chip gold">Bestseller</span>
    <span class="chip ghost">New listing</span>
    <span class="chip clay">Limited</span>
  </div>
  <div class="row"><span class="eyebrow">Pill tag</span>
    <span class="tag">airbnb</span><span class="tag">schedule-e</span><span class="tag">3–10 properties</span><span class="tag">irs-ready</span>
  </div>
  <div class="row"><span class="eyebrow">SKU row</span>
    <span class="sku-badge">TAX-001 · v2.1 · thestrledger.com</span>
  </div>
  <div class="row"><span class="eyebrow">Metric dots</span>
    <span style="font-family:var(--font-display);font-size:28px;color:var(--brand-navy);font-weight:500;">$8,427</span>
    <span style="font-family:var(--font-body);font-size:12px;color:var(--fg-3);">·</span>
    <span style="font-family:var(--font-body);font-size:13px;color:var(--fg-2);">avg. year-one reclaim via cost seg</span>
  </div>
</div>
</body></html>
