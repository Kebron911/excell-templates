<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Signatures</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 36px;background:var(--bg-1);box-sizing:border-box;display:grid;grid-template-columns:1.1fr 1fr;gap:28px;}
  h5{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--brand-gold);margin:0 0 10px;}
  .demo1{font-family:var(--font-display);font-weight:500;font-size:64px;color:var(--brand-navy);line-height:1;letter-spacing:-0.02em;}
  .demo1 em{font-style:italic;font-weight:400;font-size:24px;display:block;margin-bottom:-4px;}
  .demo1 .p{color:var(--brand-gold);}
  .rule{width:48px;height:1px;background:var(--brand-gold);margin:24px 0 8px;}
  .tag{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:0.22em;color:var(--brand-navy);text-transform:uppercase;}
  .notes{display:flex;flex-direction:column;gap:14px;font-family:var(--font-body);font-size:13px;color:var(--fg-2);line-height:1.45;}
  .notes b{color:var(--brand-navy);font-weight:600;}
  .pull{font-family:var(--font-display);font-style:italic;font-size:20px;color:var(--brand-navy);border-left:2px solid var(--brand-gold);padding:4px 0 4px 14px;line-height:1.3;}
</style>
</head>
<body>
<div class="card">
  <div>
    <h5>The four signatures</h5>
    <div class="demo1"><em>The</em>STR Ledger<span class="p">.</span></div>
    <div class="rule"></div>
    <div class="tag">Run your rentals before they run you</div>
  </div>
  <div>
    <div class="notes">
      <div><b>1. Italic "The"</b> at ⅓ size, masthead style.</div>
      <div><b>2. Gold terminal period</b> — color-on-glyph declaration.</div>
      <div><b>3. 48px gold rule</b> under display type.</div>
      <div><b>4. Tracked tagline</b> in Inter 500, 0.22em.</div>
    </div>
    <div class="pull" style="margin-top:18px;">Formula-tight. Built for 3–10 properties.</div>
  </div>
</div>
</body></html>
