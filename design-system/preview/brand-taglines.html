<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Brand — Tagline system</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 32px;background:var(--brand-navy);box-sizing:border-box;color:var(--brand-parchment);}
  h5{font-family:var(--font-body);font-weight:500;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--brand-gold);margin:0 0 18px;}
  .hero{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:40px;color:var(--brand-parchment);line-height:1.1;margin:0 0 20px;}
  .rule{width:48px;height:1px;background:var(--brand-gold);margin:0 0 20px;}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  .it{display:flex;flex-direction:column;gap:6px;}
  .when{font-family:var(--font-mono);font-size:9px;letter-spacing:0.22em;color:var(--brand-gold);text-transform:uppercase;}
  .tl{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:18px;color:var(--brand-parchment);line-height:1.25;}
</style>
</head>
<body>
<div class="card">
  <h5>Taglines — hero + campaign</h5>
  <div class="hero">Run your rentals before they run you.</div>
  <div class="rule"></div>
  <div class="grid">
    <div class="it"><span class="when">Tax · Dec–Apr</span><span class="tl">Close your year before April does.</span></div>
    <div class="it"><span class="when">Operations</span><span class="tl">Turnover chaos has a spreadsheet.</span></div>
    <div class="it"><span class="when">Guest experience</span><span class="tl">Welcome books that earn 5-stars.</span></div>
  </div>
</div>
</body></html>
