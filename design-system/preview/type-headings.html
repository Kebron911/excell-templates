<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type — Heading scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 36px;background:var(--bg-1);box-sizing:border-box;}
  .row{display:flex;align-items:baseline;gap:20px;padding:6px 0;border-bottom:1px solid var(--rule);}
  .row:last-child{border-bottom:0;}
  .lbl{flex:0 0 56px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;color:var(--fg-3);text-transform:uppercase;}
  .txt{font-family:var(--font-display);font-weight:500;color:var(--brand-navy);line-height:1.05;}
  .meta{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:0.1em;}
  .h1{font-size:48px;letter-spacing:-0.015em;}
  .h2{font-size:36px;letter-spacing:-0.01em;}
  .h3{font-size:26px;letter-spacing:-0.005em;}
  .h4{font-family:var(--font-body);font-weight:600;font-size:20px;color:var(--brand-navy);letter-spacing:0;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="lbl">H1</span><span class="txt h1">Close your year</span><span class="meta">48 / 500 / -0.015</span></div>
  <div class="row"><span class="lbl">H2</span><span class="txt h2">Schedule E for hosts</span><span class="meta">36 / 500 / -0.010</span></div>
  <div class="row"><span class="lbl">H3</span><span class="txt h3">What's in this workbook</span><span class="meta">26 / 500 / -0.005</span></div>
  <div class="row"><span class="lbl">H4</span><span class="txt h4">Per-property rollup</span><span class="meta">20 / Inter 600</span></div>
</div>
</body></html>
