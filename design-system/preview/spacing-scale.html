<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;}
  .card{width:700px;padding:28px 36px;background:var(--bg-1);box-sizing:border-box;}
  .row{display:flex;align-items:center;gap:16px;padding:4px 0;}
  .lbl{flex:0 0 64px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;color:var(--brand-navy);text-transform:uppercase;}
  .bar{height:10px;background:var(--brand-navy);}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-left:10px;letter-spacing:0.1em;}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="lbl">sp-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
  <div class="row"><span class="lbl">sp-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
  <div class="row"><span class="lbl">sp-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
  <div class="row"><span class="lbl">sp-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
  <div class="row"><span class="lbl">sp-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
  <div class="row"><span class="lbl">sp-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
  <div class="row"><span class="lbl">sp-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
  <div class="row"><span class="lbl">sp-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
  <div class="row"><span class="lbl">sp-9</span><div class="bar" style="width:96px"></div><span class="px">96</span></div>
  <div class="row"><span class="lbl">sp-10</span><div class="bar" style="width:128px"></div><span class="px">128</span></div>
</div>
</body></html>
