<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pinterest pin templates — The STR Ledger</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #E9E9E9; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
  .pin-wrap { width: 240px; height: 360px; overflow: hidden; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); background: white; }
  .pin-wrap > div { transform: scale(0.24); transform-origin: top left; }
  .pin-label { font-size: 12px; color: #555; margin-top: 12px; font-weight: 500; letter-spacing: 0.04em; }
  .pin-sub { font-size: 11px; color: #888; margin-top: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/Pin.jsx"></script>

<script type="text/babel">
function PinterestHeader() {
  return (
    <div style={{ background: "white", borderBottom: "1px solid #E9E9E9", padding: "12px 24px", display: "flex", alignItems: "center", gap: 16 }}>
      <span style={{ width: 32, height: 32, borderRadius: "50%", background: "#E60023", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontFamily: "Georgia, serif" }}>P</span>
      <input style={{ flex: 1, maxWidth: 720, padding: "12px 18px", fontSize: 14, borderRadius: 22, border: "1px solid transparent", background: "#EFEFEF" }} defaultValue="airbnb tax deductions"/>
      <span style={{ fontSize: 13, color: "#555" }}>Pins for @thestrledger</span>
    </div>
  );
}

function PinCard({ label, sub, children }) {
  return (
    <div>
      <div className="pin-wrap">{children}</div>
      <div className="pin-label">{label}</div>
      <div className="pin-sub">{sub}</div>
    </div>
  );
}

function Gallery() {
  return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: "32px 24px 64px" }}>
      <div style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 36, letterSpacing: "-0.01em", color: "var(--brand-navy)", marginBottom: 6 }}>
        <span style={{ fontStyle: "italic", fontWeight: 400 }}>The</span> Pin System<span style={{ color: "var(--brand-gold)" }}>.</span>
      </div>
      <div style={{ fontSize: 14, color: "#555", marginBottom: 32 }}>Six 1000×1500 templates · shown at 24% scale</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 240px)", gap: 28, justifyContent: "start" }}>
        <PinCard label="01 · Big Number" sub="Navy — stat with parchment receipt"><PinBigNumber/></PinCard>
        <PinCard label="02 · List Promise" sub="Navy — N-deductions on navy"><PinListPromise/></PinCard>
        <PinCard label="03 · Stat-Led Quote" sub="Parchment — hero stat + pull-quote"><PinQuote/></PinCard>
        <PinCard label="04 · Before / After" sub="Navy — paper/parchment cards"><PinComparison/></PinCard>
        <PinCard label="05 · Stacked Words" sub="Parchment — hero tagline stack"><PinStackedWords/></PinCard>
        <PinCard label="06 · Workbook Mock" sub="Parchment — editorial ledger page"><PinWorkbookMock/></PinCard>
      </div>

      <div style={{ marginTop: 56, fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 24, color: "var(--brand-navy)", marginBottom: 18 }}>
        Full-size preview<span style={{ color: "var(--brand-gold)" }}>.</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 32 }}>
        {[PinBigNumber, PinQuote, PinWorkbookMock].map((P, i) => (
          <div key={i} style={{ width: "100%", aspectRatio: "2/3", overflow: "hidden", borderRadius: 16, background: "white", boxShadow: "0 4px 12px rgba(0,0,0,0.08)" }}>
            <div style={{ width: 1000, height: 1500, transform: "scale(" + (1/1000*400) + ")", transformOrigin: "top left" }}>
              <P/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<>
  <PinterestHeader/>
  <Gallery/>
</>);
</script>
</body>
</html>
