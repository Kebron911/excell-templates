function FormulaBar({ cell, formula }) {

function TabBar({ active, setActive }) {
  return (
    <div style={{ display: "flex", background: "var(--brand-parchment-dark)", borderTop: "1px solid var(--rule-strong)" }}>

  { key: "descr", label: "B · Note", width: 260 },
  { key: "amt", label: "C · 2025", width: 140 },

function App() {
  const [tab, setTab] = useState("income");

  let content, cell, formula;
  if (tab === "cover") { content = <CoverSheet/>; cell = "A1"; formula = ""; }
  else if (tab === "income")  { content = <Sheet columns={incomeCols} rows={incomeRows} highlighted={new Set(["h"])} frozenRows={1}/>; cell = "I2"; formula = "=SUMIF(Income!B:B,\"Airbnb\",Income!I:I)+SUMIF(Income!B:B,\"VRBO\",Income!I:I)"; }
  else if (tab === "deducts") { content = <Sheet columns={deductCols} rows={deductRows} highlighted={new Set(["h"])} frozenRows={1}/>; cell = "E2"; formula = "=SUBTOTAL(9,E3:E49)   ← sums all 47 categories"; }
  else if (tab === "deprec")  { content = <Sheet columns={deprecCols} rows={deprecRows} highlighted={new Set(["h"])} frozenRows={1}/>; cell = "G2"; formula = "=SUMPRODUCT((C:C-F:F)/D:D)   ← current-year depreciation"; }
  else if (tab === "schede")  { content = <Sheet columns={scheCols} rows={scheRows} highlighted={new Set(["h1",14])} frozenRows={1}/>; cell = "C15"; formula = "=C2-C14   ← flows to Form 1040 Schedule E, Line 21"; }
  else { content = <div style={{ flex: 1, padding: 48, fontFamily: "var(--font-display)", fontStyle: "italic", fontSize: 32, color: "var(--fg-3)" }}>Sheet preview — open The 2025 Ledger to explore.</div>; cell = "A1"; formula = ""; }

  return (<>
    <TitleBar/>
    <Ribbon tab={tab}/>
    <FormulaBar cell={cell} formula={formula}/>
    {content}
    <TabBar active={tab} setActive={setTab}/>
    <StatusBar tab={tab}/>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
