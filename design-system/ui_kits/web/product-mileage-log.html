function PreviewMonthly() {

    ["Repairs",             "47",  "94",  "0",   "141"],

    ["Total miles",         "461", "498", "440", "1,399"],

  ];

    <div style={{ width: "100%", height: "100%", background: "var(--brand-parchment)", padding: 36, boxSizing: "border-box", overflow: "hidden" }}>

        {months.map(m => <span key={m} style={{ textAlign: "right", color: m === "YTD" ? "var(--brand-gold)" : "var(--fg-3)" }}>{m}</span>)}
      </div>
      {rows.map(([label, ...vals], i) => {
        const isTotal = label.startsWith("Total") || label.startsWith("$");
        const isDed = label.startsWith("$");
        return (
          <div key={label} style={{ display: "grid", gridTemplateColumns: "1.5fr repeat(4, 1fr)", gap: 6, padding: "9px 0", borderTop: isTotal && !isDed ? "2px solid var(--brand-navy)" : (isDed ? "1px solid var(--brand-navy)" : "1px dashed rgba(11,28,47,0.10)"), marginTop: isTotal && !isDed ? 6 : 0, alignItems: "baseline" }}>

              {isTotal ? <span style={{ fontStyle: "italic", fontWeight: 400 }}>{label}</span> : label}
            </span>
            {vals.map((v, j) => (
              <span key={j} style={{ fontFamily: "var(--font-mono)", fontSize: isTotal ? 12 : 11, textAlign: "right", color: isDed || j === 3 ? "var(--brand-gold)" : "var(--fg-2)", fontWeight: isTotal ? 500 : 400 }}>{v}</span>

}
