<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The 2025 Ledger — The STR Ledger</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--brand-parchment); }
  a { color: inherit; }
  button:hover { filter: brightness(0.92); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/atoms.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Breadcrumbs() {
  return (
    <div style={{ maxWidth: 1200, margin: "0 auto", padding: "20px 48px 0", fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: "var(--fg-3)" }}>
      <a href="index.html" style={{ color: "var(--fg-3)", textDecoration: "none" }}>Home</a> · <a href="#" style={{ color: "var(--fg-3)", textDecoration: "none" }}>Templates</a> · <span style={{ color: "var(--brand-gold)" }}>The 2025 Ledger</span>
    </div>
  );
}

function ProductHero() {
  const [qty, setQty] = useState(1);
  return (
    <section style={{ padding: "48px 48px 96px" }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 72 }}>
        {/* Preview */}
        <div>
          <div style={{ background: "var(--brand-navy)", padding: 36, position: "relative", aspectRatio: "1/1.05" }}>
            <div style={{ position: "absolute", inset: 28, background: "var(--brand-parchment)", padding: "56px 44px", boxShadow: "0 40px 60px -30px rgba(11,28,47,0.5)" }}>
              <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--brand-gold)" }}>Workbook · 2025 ed.</div>
              <div style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 44, letterSpacing: "-0.015em", color: "var(--brand-navy)", marginTop: 12, lineHeight: 1.05 }}>
                <span style={{ fontStyle: "italic", fontWeight: 400 }}>The</span><br/>
                2025 Ledger<span style={{ color: "var(--brand-gold)" }}>.</span>
              </div>
              <div style={{ height: 1, background: "var(--brand-gold)", width: 48, margin: "28px 0" }}/>
              <div style={{ fontFamily: "var(--font-display)", fontStyle: "italic", fontSize: 17, color: "var(--fg-2)", lineHeight: 1.5 }}>
                A Schedule E workbook<br/>for hosts who treat their rentals<br/>like a real business.
              </div>
              <div style={{ position: "absolute", bottom: 44, left: 44, fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--fg-3)" }}>Vol. IX · by Emily Reed, host since 2017</div>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginTop: 12 }}>
            {[1,2,3,4].map(i => (
              <div key={i} style={{ aspectRatio: "1/1", background: i === 1 ? "var(--brand-navy)" : "var(--brand-paper)", border: "1px solid var(--rule)" }}/>
            ))}
          </div>
        </div>

        {/* Copy */}
        <div>
          <Eyebrow>Tax workbook · Schedule E</Eyebrow>
          <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 52, letterSpacing: "-0.015em", color: "var(--brand-navy)", margin: "16px 0 0", lineHeight: 1.08 }}>
            <span style={{ fontStyle: "italic", fontWeight: 400 }}>The</span> 2025 Ledger<span style={{ color: "var(--brand-gold)" }}>.</span>
          </h1>
          <GoldRule width={48} my={24}/>
          <p style={{ fontFamily: "var(--font-body)", fontSize: 17, lineHeight: 1.65, color: "var(--fg-2)", margin: 0 }}>
            Pre-wired to 47 deductions, every line of Schedule E, and the four forms your CPA will ask for. Import your Airbnb and VRBO CSVs, answer nine questions, and walk into April with a hand-off pack instead of a shoebox.
          </p>

          <div style={{ marginTop: 36, padding: "24px 0", borderTop: "1px solid var(--rule)", borderBottom: "1px solid var(--rule)" }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 16 }}>
              <span style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 44, color: "var(--brand-navy)", letterSpacing: "-0.01em" }}>$147</span>
              <span style={{ fontFamily: "var(--font-body)", fontSize: 14, color: "var(--fg-3)", textDecoration: "line-through" }}>$197</span>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--brand-gold)", marginLeft: "auto" }}>Early-filer price · thru Mar 31</span>
            </div>
          </div>

          <div style={{ marginTop: 28 }}>
            <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--fg-3)", marginBottom: 10 }}>How many properties</div>
            <div style={{ display: "flex", gap: 8 }}>
              {[1, 2, "3-5", "6+"].map(n => (
                <button key={n} onClick={() => setQty(n)} style={{
                  fontFamily: "var(--font-body)", fontSize: 14, padding: "12px 20px",
                  background: qty === n ? "var(--brand-navy)" : "transparent",
                  color: qty === n ? "var(--brand-parchment)" : "var(--brand-navy)",
                  border: "1px solid " + (qty === n ? "var(--brand-navy)" : "var(--rule-strong)"),
                  cursor: "pointer",
                }}>{n}</button>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", gap: 12, marginTop: 28 }}>
            <Button variant="primary" size="lg" full>Add to cart · $147</Button>
            <Button variant="secondary" size="lg">♡</Button>
          </div>

          <div style={{ marginTop: 32, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20, paddingTop: 24, borderTop: "1px solid var(--rule)" }}>
            {[
              ["Instant download", ".xlsx + .pdf"],
              ["Free 2026 update", "Through next April"],
              ["30-day refund", "No questions asked"],
            ].map(([t, s]) => (
              <div key={t}>
                <div style={{ fontFamily: "var(--font-body)", fontSize: 13, fontWeight: 500, color: "var(--brand-navy)" }}>{t}</div>
                <div style={{ fontFamily: "var(--font-body)", fontSize: 12, color: "var(--fg-3)", marginTop: 2 }}>{s}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function WhatsInside() {
  const sections = [
    ["01", "Income", "Gross rents · cleaning fees · extra-guest · damage deposits · platform payouts reconciled against bank deposits."],
    ["02", "Operating deductions", "26 categories, with the cite under each — supplies, repairs, utilities, HOA, insurance, licenses, the lot."],
    ["03", "Mortgage & interest", "Form 1098 import · point amortization · the 'Is this really deductible?' checklist for second homes."],
    ["04", "Depreciation", "Cost-seg-study ready · Form 4562 auto-fill · the 27.5-year schedule you'll use for the next decade."],
    ["05", "Travel & mileage", "The only property-visit log the IRS has ever accepted. With the 2025 rate baked in."],
    ["06", "Hand-off pack", "A PDF your CPA will actually smile at. Every figure sourced, every form referenced, every total tied."],
  ];
  return (
    <section style={{ background: "var(--brand-paper)", padding: "96px 48px", borderTop: "1px solid var(--rule-strong)" }}>
      <div style={{ maxWidth: 1100, margin: "0 auto" }}>
        <Eyebrow>What's inside</Eyebrow>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 40, letterSpacing: "-0.01em", color: "var(--brand-navy)", margin: "16px 0 48px", maxWidth: 680 }}>
          Six tabs<span style={{ color: "var(--brand-gold)" }}>.</span> Every line of Schedule E. Zero guessing.
        </h2>
        <div>
          {sections.map(([n, t, b]) => (
            <div key={n} style={{ display: "grid", gridTemplateColumns: "90px 1fr 1.2fr", gap: 48, padding: "32px 0", borderTop: "1px solid var(--rule-strong)" }}>
              <span style={{ fontFamily: "var(--font-display)", fontStyle: "italic", fontWeight: 400, fontSize: 36, color: "var(--brand-gold)", lineHeight: 1 }}>{n}</span>
              <div style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 24, letterSpacing: "-0.01em", color: "var(--brand-navy)", lineHeight: 1.2 }}>{t}</div>
              <div style={{ fontFamily: "var(--font-body)", fontSize: 15, color: "var(--fg-2)", lineHeight: 1.6 }}>{b}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function SarahQuote() {
  return (
    <section style={{ background: "var(--brand-navy)", padding: "96px 48px", color: "var(--brand-parchment)" }}>
      <div style={{ maxWidth: 880, margin: "0 auto", textAlign: "center" }}>
        <div style={{ fontFamily: "var(--font-display)", fontStyle: "italic", fontWeight: 400, fontSize: 120, color: "var(--brand-gold)", lineHeight: 0.6, marginBottom: 24 }}>"</div>
        <p style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 34, lineHeight: 1.35, letterSpacing: "-0.01em", color: "var(--brand-parchment)", margin: 0 }}>
          My CPA asked where I got it. I told her. She's recommending it to her other Airbnb clients now<span style={{ color: "var(--brand-gold)" }}>.</span>
        </p>
        <GoldRule width={32} my={32} align="center"/>
        <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: "0.24em", textTransform: "uppercase", color: "var(--fg-on-navy-muted)" }}>Sarah K. · 4 properties · Smoky Mountains</div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<>
  <Header active="templates"/>
  <Breadcrumbs/>
  <ProductHero/>
  <WhatsInside/>
  <SarahQuote/>
  <Footer/>
</>);
</script>
</body>
</html>
