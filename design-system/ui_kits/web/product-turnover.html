function PreviewChecklist() {

    ["Kitchen",   ["Inside microwave + oven", "Coffee pods · filters · 12-count", "Dish soap · sponge replaced", "Fridge · wipe shelves, take out leftovers"]],
  ];
  return (
    <div style={{ width: "100%", height: "100%", background: "var(--brand-parchment)", padding: 36, boxSizing: "border-box", overflow: "hidden" }}>

      </div>
      <div style={{ marginTop: 14 }}>

          <div key={zone} style={{ padding: "10px 0", borderTop: i === 0 ? "none" : "1px dashed rgba(11,28,47,0.12)" }}>

            {items.map((it, j) => (
              <div key={j} style={{ display: "grid", gridTemplateColumns: "20px 1fr 32px", gap: 10, padding: "3px 0", alignItems: "baseline" }}>
                <span style={{ fontFamily: "var(--font-display)", fontStyle: "italic", color: "var(--brand-gold)", fontSize: 14 }}>☐</span>
                <span style={{ fontFamily: "var(--font-body)", fontSize: 12, color: "var(--brand-navy)", lineHeight: 1.45 }}>{it}</span>

}

function PreviewScorecard() {

    ["Miguel · Ridge Housekeeping","6",  "36.7", "17%", "2"],

    <div style={{ width: "100%", height: "100%", background: "var(--brand-parchment)", padding: 36, boxSizing: "border-box" }}>

      <div style={{ marginTop: 16 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1.6fr 0.6fr 0.6fr 0.6fr 0.4fr", gap: 12, padding: "8px 0", borderBottom: "1px solid var(--rule)", fontFamily: "var(--font-mono)", fontSize: 9, letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--fg-3)" }}>

        </div>
        {rows.map(([name, turns, avg, iss, rank], i) => {
          const tone = i === 0 ? "var(--brand-gold)" : i === 1 ? "var(--fg-2)" : "var(--brand-clay)";

            <div key={name} style={{ display: "grid", gridTemplateColumns: "1.6fr 0.6fr 0.6fr 0.6fr 0.4fr", gap: 12, padding: "12px 0", borderBottom: "1px dashed rgba(11,28,47,0.12)", alignItems: "baseline" }}>

              <span style={{ fontFamily: "var(--font-display)", fontStyle: "italic", fontWeight: 500, fontSize: 16, textAlign: "right", color: tone }}>{avg}</span>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, textAlign: "right", color: "var(--fg-2)" }}>{iss}</span>
              <span style={{ fontFamily: "var(--font-display)", fontStyle: "italic", fontSize: 18, textAlign: "right", color: "var(--brand-gold)" }}>{rank}</span>

  return (
    <section style={{ padding: "48px 48px 96px" }}>

              }}>

                <span style={{ fontFamily: "var(--font-mono)", fontSize: 8, letterSpacing: "0.22em", textTransform: "uppercase", color: i === view ? "var(--brand-parchment)" : "var(--fg-3)" }}>{p.label}</span>
              </button>
            ))}
          </div>
        </div>

        <div>
          <Eyebrow>Operations · OPS-001</Eyebrow>
          <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 52, letterSpacing: "-0.015em", color: "var(--brand-navy)", margin: "16px 0 0", lineHeight: 1.08 }}>
            <span style={{ fontStyle: "italic", fontWeight: 400 }}>The</span> Turnover Checklist<span style={{ color: "var(--brand-gold)" }}>.</span>
          </h1>
          <GoldRule width={48} my={24}/>
          <p style={{ fontFamily: "var(--font-body)", fontSize: 17, lineHeight: 1.65, color: "var(--fg-2)", margin: 0 }}>

          <div style={{ marginTop: 36, padding: "24px 0", borderTop: "1px solid var(--rule)", borderBottom: "1px solid var(--rule)" }}>
            <div style={{ display: "flex", alignItems: "baseline", gap: 16 }}>

              <span style={{ fontFamily: "var(--font-body)", fontSize: 14, color: "var(--fg-3)", textDecoration: "line-through" }}>$67</span>

            </div>
          </div>

          <div style={{ marginTop: 28 }}>

            return (
              <a key={sku} href={href} style={{ display: "block", textDecoration: "none", padding: "32px 32px 28px", background: "var(--brand-paper)", border: "1px solid var(--rule)" }}>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.22em", textTransform: "uppercase", color: "var(--brand-gold)" }}>{sku}</div>
                <div style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 26, letterSpacing: "-0.01em", color: "var(--brand-navy)", marginTop: 10 }}>
                  <span style={{ fontStyle: "italic", fontWeight: 400 }}>{title.split(" ")[0]}</span> {title.split(" ").slice(1).join(" ")}<span style={{ color: "var(--brand-gold)" }}>.</span>
                </div>
                <div style={{ fontFamily: "var(--font-body)", fontSize: 14, color: "var(--fg-2)", lineHeight: 1.6, marginTop: 12 }}>{body}</div>
              </a>
            );
          })}
        </div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<>
  <Header active="templates"/>
  <Breadcrumbs/>
  <ProductHero/>
  <WhatsInside/>
  <HowItWorks/>
  <SarahQuote/>
  <PairedWith/>
  <Footer/>
</>);
</script>
</body>
</html>
