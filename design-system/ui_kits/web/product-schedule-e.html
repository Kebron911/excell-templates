    ["18",  "Utilities",              "5,800"],
    ["20",  "Depreciation",           "32,400"],
    ["26",  "Income or (loss)",       "10,500"],
  ];
  return (
    <div style={{ width: "100%", height: "100%", background: "var(--brand-parchment)", padding: 36, boxSizing: "border-box", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", borderBottom: "1px solid var(--rule)", paddingBottom: 14 }}>

      </div>
      <div style={{ marginTop: 14 }}>
        {lines.map(([line, label, amount], i) => {
          const isTotal = label.startsWith("Income");
          const isAddr = line === "1a";

              <span style={{ fontFamily: "var(--font-display)", fontWeight: isTotal ? 500 : 400, fontSize: isTotal ? 16 : 13, color: "var(--brand-navy)" }}>
                {isTotal ? <><span style={{ fontStyle: "italic", fontWeight: 400 }}>{label.split(" or ")[0]}</span> or {label.split(" or ")[1]}</> : label}
