function ListingGrid() {
  return (
    <div style={{ maxWidth: 1200, margin: "0 auto", padding: "32px 48px 64px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, fontFamily: "Helvetica, Arial, sans-serif", fontSize: 13, color: ETSY.text2 }}>
        <span><strong style={{ color: ETSY.text }}>{LISTINGS.length} items</strong></span>
        <div style={{ display: "flex", gap: 12 }}>
          <select style={{ padding: "8px 12px", border: "1px solid " + ETSY.rule, borderRadius: 4, fontSize: 13, background: "white" }}>
            <option>Sort: Most recent</option>
            <option>Lowest price</option>
            <option>Highest price</option>
            <option>Top customer reviews</option>
          </select>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
        {LISTINGS.map(l => <ListingCard key={l.sku} {...l}/>)}
      </div>
    </div>
  );
}

function EtsyFooter() {

    </div>
  );
}
