<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="180" height="54" viewBox="0 0 180 54" role="img" aria-label="Built with The STR Ledger">
  <title>Built with The STR Ledger</title>
  <desc>Dark variant of attribution badge. Use on light-on-dark customer pages.</desc>

  <!-- Background card: Harbor Navy with Muted Gold border -->
  <rect x="0.5" y="0.5" width="179" height="53" rx="4" ry="4"
        fill="#12304E" stroke="#C9A24B" stroke-width="1"/>

  <!-- Left accent rule (Muted Gold) -->
  <rect x="6" y="10" width="2" height="34" fill="#C9A24B"/>

  <!-- "Built with" small caps -->
  <text x="15" y="20"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="8" font-weight="600" letter-spacing="1.2"
        fill="#F6EFE2" text-transform="uppercase">BUILT WITH</text>

  <!-- "The" italic line -->
  <text x="15" y="34"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="10" font-weight="400"
        fill="#F6EFE2">The</text>

  <!-- "STR Ledger." wordmark with gold period -->
  <text x="33" y="34"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="14" font-weight="500" letter-spacing="-0.2"
        fill="#F6EFE2">STR Ledger<tspan fill="#C9A24B">.</tspan></text>

  <!-- Domain footer -->
  <text x="15" y="46"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="7" font-weight="400" letter-spacing="0.5"
        fill="#F6EFE2" opacity="0.7">thestrledger.com</text>
</svg>
