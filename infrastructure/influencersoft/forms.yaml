# ===== Field requirements (all forms enforce) =====
required_fields:
  - email
  - first_name  # used in {{ first_name }} merge tag across all sequences

# ===== Compliance =====
compliance:
  unsubscribe_required: true
  physical_address_required: true  # CAN-SPAM
  privacy_policy_link_required: true
  honeypot_field: hp_address  # bot spam mitigation
  recaptcha_v3: false  # add when spam exceeds 5%/wk
