# InfluencerSoft Form Registry — Source of Truth
#
# Every email-capture form across the cluster is registered here. Forms create
# IS contacts and apply tags from tag-dictionary.md. After IS is provisioned,
# replace __SET_AFTER_IS_LIVE__ with the actual form_id from the IS UI.
#
# Schema:
#   id: stable identifier — used in <form action="..."> on Astro pages
#   path: site path where the form appears
#   site: which cluster site renders it
#   purpose: what magnet/funnel it feeds
#   tags_on_submit: tags applied at form submit (must exist in tag-dictionary.md)
#   sequence_after_submit: IS sequence that fires (must exist in sequences/)
#   redirect_to: post-submit URL (download page or thank-you)
#   is_form_id: __SET_AFTER_IS_LIVE__
#   double_opt_in: true|false — required by deliverability runbook

version: 1
last_reviewed: 2026-05-16

