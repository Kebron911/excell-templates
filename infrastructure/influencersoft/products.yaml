# InfluencerSoft Product Registry — Source of Truth
#
# Every SKU that gets sold (Stripe, Etsy, Gumroad, Bundle) is registered here.
# Scripts in scripts/is-*.mjs and n8n workflows pull product:<slug> tags from
# this file. Slug here MUST match the `product:<slug>` tag in tag-dictionary.md
# section 3.
#
# Schema:
#   slug: stable identifier — never rename after publish
#   sku: catalog SKU code (TAX-001, BUNDLE-01, etc.)
#   name: human display name
#   category: tax|ops|guests|acq|fin|mkt|rev|str|gst|lgl|bundle|manual|course|book
#   price_usd: site checkout price (Stripe) — null for free magnets
#   etsy_price_usd: Etsy variant price (often lower)
#   gumroad_price_usd: Gumroad variant price (often higher)
#   tier: starter|core|premium|bundle|magnet
#   deliverable: xlsx|pdf|zip|pdf+xlsx|video+pdf|hardcover|access
#   delivery_path: relative path to delivered asset(s)
#   bundle_eligible_for: list of bundle slugs this SKU rolls into
#   tags_set_on_purchase: tags applied at order webhook
#   sequence_after_purchase: IS sequence triggered (must exist in sequences/)
#   stripe_price_id: __SET_AFTER_STRIPE_LIVE__
#   etsy_listing_id: __SET_AFTER_ETSY_LIVE__
#   gumroad_product_id: __SET_AFTER_GUMROAD_LIVE__

