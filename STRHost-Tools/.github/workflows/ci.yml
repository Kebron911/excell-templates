name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm e2e:install

      - name: Build (also generates OG images)
        run: pnpm build
        env:
          # GA4 + AdSense + ESP env vars are intentionally left unset for
          # the CI build so analytics/ads don't fire from CI traffic.
          # Production deploy supplies real values via repo vars/secrets.
          PUBLIC_ADSENSE_ENABLED: false

      - name: Playwright E2E
        run: pnpm e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
