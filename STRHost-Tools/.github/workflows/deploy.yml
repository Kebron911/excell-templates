name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run after CI passes on the same SHA
    needs: []
    concurrency:
      group: deploy-strhost-tools
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          PUBLIC_ADSENSE_ENABLED: ${{ vars.PUBLIC_ADSENSE_ENABLED }}
          PUBLIC_ADSENSE_CLIENT:  ${{ vars.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GA4_ID:          ${{ vars.PUBLIC_GA4_ID }}
          PUBLIC_ESP_WEBHOOK:     ${{ vars.PUBLIC_ESP_WEBHOOK }}

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.HOSTINGER_FTP_HOST }}
          username:  ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password:  ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true

      - name: Post-deploy smoke
        run: node scripts/post-deploy-smoke.mjs
        env:
          SMOKE_BASE_URL: https://strhost.tools
