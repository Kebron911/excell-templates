name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: STROps-Tools
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: STROps-Tools/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Vitest unit tests
        run: pnpm test

      # Soft-fail Playwright browser install — sister-cluster precedent.
      # Hostinger-runner transient apt failures shouldn't block CI for
      # branches that only touched non-e2e code paths.
      - name: Install Playwright browsers
        id: pw_install
        continue-on-error: true
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (also generates OG images via prebuild)
        run: pnpm build
        env:
          # CI build runs without analytics/ESP/AdSense env so no traffic
          # leaks from CI runners. Production deploy supplies real values
          # via repo secrets in deploy.yml.
          PUBLIC_ADSENSE_ENABLED: false

      - name: Playwright E2E
        if: steps.pw_install.outcome == 'success'
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: STROps-Tools/playwright-report
          retention-days: 14

      - name: Upload dist
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: STROps-Tools/dist
          retention-days: 7
