name: Deploy strops.tools

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-strops-tools
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: STROps-Tools

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: STROps-Tools/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          PUBLIC_GA4_ID:           ${{ secrets.PUBLIC_GA4_ID }}
          PUBLIC_ESP_ENDPOINT:     ${{ secrets.PUBLIC_ESP_ENDPOINT }}
          PUBLIC_ADSENSE_ENABLED:  ${{ vars.PUBLIC_ADSENSE_ENABLED }}
          PUBLIC_ADSENSE_CLIENT:   ${{ vars.PUBLIC_ADSENSE_CLIENT }}

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/sitemap-index.xml
          test -f dist/robots.txt
          echo "Build output OK"

      # SSH-based deploy. Mirrors strguests.tools precedent (commit
      # 9a07321 ci(strguests): switch to SSH+rsync deploy via shared
      # STR_SSH_KEY). The shared cluster Hostinger account uses a single
      # private key in secret STR_SSH_KEY; per-domain secrets pin the
      # host/user/port (also shared values, but read from secrets so we
      # never hardcode infra in the repo).
      - name: Set up SSH key
        working-directory: .
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STR_SSH_KEY }}
          SSH_HOST:        ${{ secrets.STR_SSH_HOST }}
          SSH_PORT:        ${{ secrets.STR_SSH_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Verbose sanity-check so a malformed key surfaces in logs.
          # Mirrors commit ad31c84 debug(strguests): verbose SSH setup.
          echo "Key file size: $(wc -c < ~/.ssh/id_ed25519) bytes"
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null && echo "Key parses OK"
          # Pin Hostinger's host key. Don't swallow ssh-keyscan errors —
          # an outbound port-block needs to surface immediately.
          ssh-keyscan -p "$SSH_PORT" -t ed25519,rsa,ecdsa "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          echo "known_hosts entries: $(wc -l < ~/.ssh/known_hosts)"

      - name: Deploy via rsync over SSH
        working-directory: .
        env:
          SSH_HOST: ${{ secrets.STR_SSH_HOST }}
          SSH_USER: ${{ secrets.STR_SSH_USER }}
          SSH_PORT: ${{ secrets.STR_SSH_PORT }}
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e "ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT -o StrictHostKeyChecking=accept-new" \
            ./STROps-Tools/dist/ \
            "$SSH_USER@$SSH_HOST:~/domains/strops.tools/public_html/"

      # Post-deploy smoke — hits the live URL and asserts critical paths
      # respond 200 with expected content. Soft-fail off; if smoke fails
      # the deploy job goes red and we know to investigate.
      - name: Post-deploy smoke
        run: node scripts/smoke.mjs
        env:
          SMOKE_BASE_URL: https://strops.tools
